<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football Sweeper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <meta name="description" content="A 3D football themed minesweeper on a spherical foot/soccer ball built with TypeScript, Vite, and BabylonJS." />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="logo">
          <h3>Football<span class="gradient-text">Sweeper</span></h3>
        </div>
        <div class="controls-panel">
          <div class="control-item">
            <select id="size-select">
              <option value="20">Easy</option>
              <option value="80" selected>Medium</option>
              <option value="180">Hard</option>
            </select>
          </div>
          <div class="status-item">
            <span class="value" id="mine-count">10</span>
            <label class="label">Mines</label>
          </div>
          <div class="status-item">
            <span class="value" id="timer">00:00</span>
            <label class="label">Time</label>
          </div>
          <button class="btn-action" id="btn-reset">
            <i class="fa fa-circle"></i>
            &nbsp;Reset
          </button>
          <button class="btn-secondary">
            <i class="fa-brands fa-github"></i>
            &nbsp;GitHub
          </button>
        </div>
      </header>
      
      <main class="canvas-container">
        <canvas id="renderCanvas"></canvas>
        <div class="instructions-overlay">
          <p>Left Click: Reveal Hexagon | Right Click: Flag Hexagon | Pentagons (Dark Gray) are Safe & Unplayable</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
